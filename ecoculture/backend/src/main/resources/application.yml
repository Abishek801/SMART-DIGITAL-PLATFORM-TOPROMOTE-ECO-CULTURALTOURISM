spring:
  application:
    name: ecoculture-api

  datasource:
    url: jdbc:h2:file:./data/ecoculturedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  mail:
    enabled: ${MAIL_ENABLED:false}
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:noreply@ecoculture.travel}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:ecoculture-super-secret-jwt-key-change-in-production-2024}
  expiration: 86400000       # 24 hours in ms
  refresh-expiration: 604800000  # 7 days

security:
  max-login-attempts: 5
  lockout-duration-minutes: 30

logging:
  level:
    root: INFO
    com.ecoculture: DEBUG
    org.springframework.security: WARN
